<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPUB.js Mobile Library</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --ink: #333;
      --muted: #777;
      --card: #ffffff;
      --edge: #ddd;
      --edge-2: #ebebeb;
      --accent: #bebebe;
      --accent-2: #999;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 28px 24px 14px;
      border-bottom: 1px solid var(--edge);
      background: var(--bg);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.5rem, 1.2rem + 2vw, 2.2rem);
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .content {
      padding: 18px 24px 24px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      color: var(--muted);
    }

    select,
    button {
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
    }

    select {
      padding: 12px;
      border: 1px solid var(--edge);
      background: #fff;
      color: var(--ink);
    }

    button {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    button:disabled {
      cursor: not-allowed;
      background: var(--edge-2);
      border-color: var(--edge);
      color: #9b9b9b;
    }

    .quick-list {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .quick-link {
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 8px;
      padding: 10px;
      transition: background-color 0.12s ease, border-color 0.12s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .quick-link:hover {
      background: var(--bg);
      border-color: var(--accent-2);
    }

    .quick-cover {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--edge);
      background: #f5f5f5;
      display: block;
    }

    .quick-cover-fallback {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 6px;
      border: 1px solid var(--edge);
      background: #f5f5f5;
      color: #9b9b9b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .quick-title {
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.3;
      min-height: 2.2em;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Mobile EPUB Library</h1>
      <p>Choose a book from the local examples/_books folder and open it directly in the mobile reader.</p>
    </header>

    <section class="content">
      <label for="book-picker">Choose an ebook</label>
      <select id="book-picker" aria-label="Choose an ebook"></select>
      <button id="open-mobile" type="button">Open in Mobile Reader</button>

      <div id="quick-list" class="quick-list" aria-label="Quick launch links"></div>
      <p class="hint">Target page: mobile.html?url=_books/...</p>
    </section>
  </main>

  <script>
    (async function () {
      var picker = document.getElementById("book-picker");
      var openMobile = document.getElementById("open-mobile");
      var quickList = document.getElementById("quick-list");
      var hint = document.querySelector(".hint");

      function buildTarget(path) {
        return "mobile.html?url=" + encodeURIComponent(path);
      }

      function extractFileName(href) {
        if (!href) {
          return "";
        }

        var cleaned = href.split("#")[0].split("?")[0];
        if (!cleaned || cleaned === "../" || cleaned === "./") {
          return "";
        }

        if (cleaned.slice(-1) === "/") {
          return "";
        }

        if (/^https?:\/\//i.test(cleaned) || cleaned.indexOf("mailto:") === 0) {
          return "";
        }

        cleaned = decodeURIComponent(cleaned);

        if (cleaned.indexOf("_books/") === 0) {
          cleaned = cleaned.slice("_books/".length);
        }

        var slash = cleaned.lastIndexOf("/");
        var fileName = slash > -1 ? cleaned.slice(slash + 1) : cleaned;

        if (!/\.(epub|opf)$/i.test(fileName)) {
          return "";
        }

        return fileName;
      }

      async function discoverBookFiles() {
        var response = await fetch("_books/");
        if (!response.ok) {
          throw new Error("Cannot read _books/ directory");
        }

        var html = await response.text();
        var doc = new DOMParser().parseFromString(html, "text/html");
        var links = doc.querySelectorAll("a[href]");
        var seen = {};
        var files = [];

        links.forEach(function (link) {
          var fileName = extractFileName(link.getAttribute("href"));
          if (!fileName) {
            return;
          }

          var key = fileName.toLowerCase();
          if (!seen[key]) {
            seen[key] = true;
            files.push(fileName);
          }
        });

        files.sort(function (a, b) {
          return a.localeCompare(b);
        });

        return files;
      }

      function formatLabel(meta, fileName) {
        var title = meta && meta.title ? String(meta.title).trim() : "";
        var creator = meta && meta.creator ? String(meta.creator).trim() : "";

        if (title && creator) {
          return title + " - " + creator;
        }

        if (title) {
          return title;
        }

        return fileName;
      }

      async function loadBookEntry(fileName) {
        var path = "_books/" + fileName;
        var label = fileName;
        var title = fileName;
        var coverUrl = "";

        if (typeof ePub === "function") {
          var book = ePub(path);
          try {
            var meta = await book.loaded.metadata;
            label = formatLabel(meta, fileName);
            title = meta && meta.title ? String(meta.title).trim() : fileName;
            if (!title) {
              title = fileName;
            }
            try {
              coverUrl = await book.coverUrl();
            } catch (coverError) {
              coverUrl = "";
            }
          } catch (error) {
            label = fileName;
            title = fileName;
          } finally {
            try {
              book.destroy();
            } catch (destroyError) {
              // Ignore cleanup errors from incomplete loads.
            }
          }
        }

        return {
          fileName: fileName,
          path: path,
          label: label,
          title: title,
          coverUrl: coverUrl
        };
      }

      function renderNoBooks(message) {
        picker.innerHTML = "";
        quickList.innerHTML = "";
        openMobile.disabled = true;

        var option = document.createElement("option");
        option.value = "";
        option.textContent = "No readable ebooks found in _books";
        picker.appendChild(option);

        if (hint) {
          hint.textContent = message;
        }
      }

      var files = [];
      try {
        files = await discoverBookFiles();
      } catch (error) {
        renderNoBooks("Could not list _books automatically. Serve examples with directory listing enabled.");
        return;
      }

      if (!files.length) {
        renderNoBooks("_books contains no .epub or .opf files.");
        return;
      }

      var entries = await Promise.all(files.map(loadBookEntry));
      openMobile.disabled = false;

      if (hint) {
        hint.textContent = "Found " + entries.length + " ebooks in _books.";
      }

      entries.forEach(function (entry) {

        var option = document.createElement("option");
        option.value = entry.path;
        option.textContent = entry.label;
        picker.appendChild(option);

        var quick = document.createElement("a");
        quick.className = "quick-link";
        quick.href = buildTarget(entry.path);

        if (entry.coverUrl) {
          var cover = document.createElement("img");
          cover.className = "quick-cover";
          cover.src = entry.coverUrl;
          cover.alt = entry.title + " cover";
          quick.appendChild(cover);
        } else {
          var fallback = document.createElement("div");
          fallback.className = "quick-cover-fallback";
          fallback.textContent = "No cover";
          quick.appendChild(fallback);
        }

        var quickTitle = document.createElement("div");
        quickTitle.className = "quick-title";
        quickTitle.textContent = entry.title;
        quick.appendChild(quickTitle);

        quickList.appendChild(quick);
      });

      function openSelectedBook() {
        var selectedPath = picker.value;
        window.location.href = buildTarget(selectedPath);
      }

      openMobile.addEventListener("click", openSelectedBook);
      picker.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          openSelectedBook();
        }
      });
    })();
  </script>
</body>
</html>
