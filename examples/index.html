<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPUB.js Mobile Library</title>
  <style>
    :root {
      --bg: #f3efe7;
      --ink: #1f1f1f;
      --muted: #6a665e;
      --card: #fffdf8;
      --edge: #cec6b8;
      --accent: #0f766e;
      --accent-2: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, #fff5da 0%, rgba(255, 245, 218, 0) 45%),
        linear-gradient(180deg, #f7f3eb 0%, #f0eadf 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 28px 24px 14px;
      border-bottom: 1px dashed var(--edge);
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(255, 255, 255, 0));
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.5rem, 1.2rem + 2vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .content {
      padding: 18px 24px 24px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      color: var(--muted);
    }

    select,
    button {
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
    }

    select {
      padding: 12px;
      border: 1px solid var(--edge);
      background: #ffffff;
      color: var(--ink);
    }

    button {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--accent-2);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: var(--accent-2);
    }

    .quick-list {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .quick-link {
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--edge);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    .quick-link:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Mobile EPUB Library</h1>
      <p>Choose a book from the local examples/_books folder and open it directly in the mobile reader.</p>
    </header>

    <section class="content">
      <label for="book-picker">Choose an ebook</label>
      <select id="book-picker" aria-label="Choose an ebook"></select>
      <button id="open-mobile" type="button">Open in Mobile Reader</button>

      <div id="quick-list" class="quick-list" aria-label="Quick launch links"></div>
      <p class="hint">Target page: mobile.html?url=_books/...</p>
    </section>
  </main>

  <script>
    (function () {
      var files = [
        "alice.epub",
        "artemis.epub",
        "hatchet.epub",
        "project-hail-mary.epub",
        "the-martian.epub",
        "moby-dick.opf"
      ];

      var picker = document.getElementById("book-picker");
      var openMobile = document.getElementById("open-mobile");
      var quickList = document.getElementById("quick-list");

      function buildTarget(path) {
        return "mobile.html?url=" + encodeURIComponent(path);
      }

      files.forEach(function (fileName) {
        var path = "_books/" + fileName;

        var option = document.createElement("option");
        option.value = path;
        option.textContent = fileName;
        picker.appendChild(option);

        var quick = document.createElement("a");
        quick.className = "quick-link";
        quick.href = buildTarget(path);
        quick.textContent = "Open " + fileName;
        quickList.appendChild(quick);
      });

      function openSelectedBook() {
        var selectedPath = picker.value;
        window.location.href = buildTarget(selectedPath);
      }

      openMobile.addEventListener("click", openSelectedBook);
      picker.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          openSelectedBook();
        }
      });
    })();
  </script>
</body>
</html>
