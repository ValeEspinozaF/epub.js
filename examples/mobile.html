<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPUB.js Mobile Example</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

  <link rel="stylesheet" type="text/css" href="mobile.css">

</head>

<body>
  <div id="header">
    <button id="tocBtn">☰</button>
    <div id="chapter_title">Chapter title</div>
    <div id="spacer"></div>
  </div>

  <div id="tocPanel">
    <ul id="toc"></ul>
  </div>

  <div id="viewer" class="mobile"></div>
  <!-- <a id="prev" href="#prev" class="arrow">‹</a>
  <a id="next" href="#next" class="arrow">›</a> -->

  <div id="prev" class="arrow">‹</div>
  <div id="next" class="arrow">›</div>

  
  <script>
    var params = URLSearchParams && new URLSearchParams(document.location.search.substring(1));
    var url = params && params.get("url") && decodeURIComponent(params.get("url"));
    var currentSectionIndex = (params && params.get("loc")) ? params.get("loc") : undefined;

    // Load the opf
    // var book = ePub(url || "https://archive.org/download/TheMartian_201808/The%20Martian.epub");
    var book = ePub(url || "_books/the-martian.epub");
    var rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      spread: "none"
    });


    // rendition.hooks.content.register(function(contents) {
    //   const doc = contents.document;

    //   doc.addEventListener("touchend", function(e) {
    //     if (tocIsOpen()) return;
    //     showArrows();
    //   }, { passive: true });

    //   doc.addEventListener("click", function(e) {
    //     if (tocIsOpen()) return;
    //     showArrows();
    //   });
    // });

    rendition.themes.default({
        p: {
            "text-indent": "0 !important",
            "margin-top": "0 !important",
            "margin-bottom": "0.8em !important"
        },
        body: {
            "font-family": "Arial, sans-serif",
            "font-size": "10px",
            "line-height": "1.3"
        }
    });


    var tocBtn = document.getElementById("tocBtn");
    var tocPanel = document.getElementById("tocPanel");

    if (tocBtn && tocPanel) {
      tocBtn.addEventListener("click", function(e) {
        e.stopPropagation(); 
        tocPanel.classList.toggle("open");
      });

      tocPanel.addEventListener("click", function(e) {
        e.stopPropagation();              // ✅ ADD THIS BLOCK
      });

      tocPanel.addEventListener("touchmove", function(e) {
        e.stopPropagation();
      });

      document.addEventListener("click", function(e) {
        if (!tocPanel.contains(e.target) && !tocBtn.contains(e.target)) {
          tocPanel.classList.remove("open");
        }
      });
    }


    function tocIsOpen() {
      return document.getElementById("tocPanel").classList.contains("open");
    }

    rendition.display(currentSectionIndex);

    book.ready.then(function() {

      var next = document.getElementById("next");

      next.addEventListener("click", function(e){
        if (tocIsOpen()) return;
        book.package.metadata.direction === "rtl" ? rendition.prev() : rendition.next();
        e.preventDefault();
      }, false);

      var prev = document.getElementById("prev");
      prev.addEventListener("click", function(e){
        if (tocIsOpen()) return;
        book.package.metadata.direction === "rtl" ? rendition.next() : rendition.prev();
        e.preventDefault();
      }, false);

      var keyListener = function(e){

        if (tocIsOpen()) return;

        // Left Key
        if ((e.keyCode || e.which) == 37) {
          book.package.metadata.direction === "rtl" ? rendition.next() : rendition.prev();
        }

        // Right Key
        if ((e.keyCode || e.which) == 39) {
          book.package.metadata.direction === "rtl" ? rendition.prev() : rendition.next();
        }

      };

      rendition.on("keyup", keyListener);
      document.addEventListener("keyup", keyListener, false);

    })

    var title = document.getElementById("title");

    rendition.on("rendered", function(section){
      var current = book.navigation && book.navigation.get(section.href);

      if (current) {

        var titleEl = document.getElementById("chapter_title");
        if (titleEl) {
          titleEl.textContent = current.label;
        }
      }

      var items = document.querySelectorAll("#toc li");
      items.forEach(li => li.classList.remove("active"));

      items.forEach(li => {
        if (li.textContent === current.label) {
          li.classList.add("active");
        }
      });

      rendition.getContents().forEach(function(contents) {
        const doc = contents.document;

        doc.removeEventListener("touchend", showArrows);
        doc.removeEventListener("click", showArrows);

        doc.addEventListener("touchend", showArrows, { passive: true });
        doc.addEventListener("click", showArrows);

      });
    });


    rendition.on("relocated", function(location){
      console.log(location);

      var next = book.package.metadata.direction === "rtl" ?  document.getElementById("prev") : document.getElementById("next");
      var prev = book.package.metadata.direction === "rtl" ?  document.getElementById("next") : document.getElementById("prev");

      if (location.atEnd) {
        next.style.visibility = "hidden";
      } else {
        next.style.visibility = "visible";
      }

      if (location.atStart) {
        prev.style.visibility = "hidden";
      } else {
        prev.style.visibility = "visible";
      }

    });


    rendition.on("layout", function(layout) {
      let viewer = document.getElementById("viewer");

      if (layout.spread) {
        viewer.classList.remove('single');
      } else {
        viewer.classList.add('single');
      }
    });

    window.addEventListener("unload", function () {
      console.log("unloading");
      this.book.destroy();
    });


    book.loaded.navigation.then(function(toc){

      var select = document.getElementById("toc");

			toc.forEach(function(chapter) {

        var li = document.createElement("li");
        li.textContent = chapter.label;

        li.addEventListener("click", function(e) {
          e.stopPropagation();
          rendition.display(chapter.href);
          document.getElementById("tocPanel").classList.remove("open");
        });

        select.appendChild(li);
			});
		});

    let arrowTimeout;

    function showArrows(e) {

      if (tocIsOpen()) return;

      const arrows = document.querySelectorAll(".arrow");

      arrows.forEach(a => a.classList.remove("hidden"));

      clearTimeout(arrowTimeout);

      arrowTimeout = setTimeout(() => {
        arrows.forEach(a => a.classList.add("hidden"));
      }, 2000); // 2 seconds
    }

    // Show on any touch or click
    // document.addEventListener("touchend", showArrows, { passive: true });
    // document.addEventListener("click", showArrows);

    // const viewer = document.getElementById("viewer");

    // viewer.addEventListener("touchend", showArrows, { passive: true });
    // viewer.addEventListener("click", showArrows);

    // Show initially
    showArrows({ target: document.body });

  </script>

</body>
</html>
