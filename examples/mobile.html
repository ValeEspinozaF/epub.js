<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPUB.js Mobile Example</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

  <link rel="stylesheet" type="text/css" href="mobile.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

</head>

<body>
  <div id="app">
    <div id="header">
      <button id="tocBtn">
        <span class="material-symbols-rounded header-icon">menu</span>
      </button>

      <div id="header-text">
        <div id="book-meta">
          <span id="book-title"></span>
          <span id="book-author"></span>
        </div>
        <h1 id="chapter_title"></h1>
      </div>

      <button id="homeBtn" aria-label="Go to library">
        <span class="material-symbols-rounded header-icon">home</span>
      </button>
    </div>

    <button id="centerToggle"></button>

    <div id="tocPanel">
      <ul id="toc"></ul>
    </div>

    <div id="viewer" class="mobile"></div>
    <!-- <a id="prev" href="#prev" class="arrow">‹</a>
    <a id="next" href="#next" class="arrow">›</a> -->

    <div id="prev" class="arrow">‹</div>
    <div id="next" class="arrow">›</div>

    <div id="footer">
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="page-counter">
        <span id="current-page">0</span> / <span id="total-pages">0</span>
      </div>
    </div>

  </div>
  <script>
    var params = URLSearchParams && new URLSearchParams(document.location.search.substring(1));
    var url = params && params.get("url") && decodeURIComponent(params.get("url"));
    var currentSectionIndex = (params && params.get("loc")) ? params.get("loc") : undefined;

    // Load the opf
    // var book = ePub(url || "https://archive.org/download/TheMartian_201808/The%20Martian.epub");
    var book = ePub(url || "_books/artemis.epub");
    var rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      spread: "none"
    });

    book.loaded.metadata.then(function(meta){
      document.getElementById("book-title").textContent = meta.title + " - ";
      document.getElementById("book-author").textContent = meta.creator;
    });


    rendition.themes.default({
        p: {
            "text-indent": "0 !important",
            "margin-top": "0 !important",
            "margin-bottom": "0.8em !important"
        },
        body: {
            "font-family": "Arial, sans-serif",
            "line-height": "1.3"
        }
    });

    // Enforce a consistent base size across EPUBs with different internal CSS.
    rendition.themes.fontSize("14px");


    var tocBtn = document.getElementById("tocBtn");
    var homeBtn = document.getElementById("homeBtn");
    var tocPanel = document.getElementById("tocPanel");

    if (homeBtn) {
      homeBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        window.location.href = "index.html";
      });
    }

    if (tocBtn && tocPanel) {
      tocBtn.addEventListener("click", function(e) {
        e.stopPropagation(); 
        tocPanel.classList.toggle("open");
      });

      tocPanel.addEventListener("click", function(e) {
        e.stopPropagation();
      });

      tocPanel.addEventListener("touchmove", function(e) {
        e.stopPropagation();
      });

      document.addEventListener("click", function(e) {
        if (!tocPanel.contains(e.target) && !tocBtn.contains(e.target)) {
          tocPanel.classList.remove("open");
        }
      });
    }


    function tocIsOpen() {
      return document.getElementById("tocPanel").classList.contains("open");
    }


    rendition.display(currentSectionIndex);

    book.ready.then(function() {

      var next = document.getElementById("next");
      next.addEventListener("click", function(e){
        if (tocIsOpen()) return;
        book.package.metadata.direction === "rtl" ? rendition.prev() : rendition.next();
        e.preventDefault();
      }, false);

      var prev = document.getElementById("prev");
      prev.addEventListener("click", function(e){
        if (tocIsOpen()) return;
        book.package.metadata.direction === "rtl" ? rendition.next() : rendition.prev();
        e.preventDefault();
      }, false);


      var keyListener = function(e){

        if (tocIsOpen()) return;

        // Left Key
        if ((e.keyCode || e.which) == 37) {
          book.package.metadata.direction === "rtl" ? rendition.next() : rendition.prev();
        }

        // Right Key
        if ((e.keyCode || e.which) == 39) {
          book.package.metadata.direction === "rtl" ? rendition.prev() : rendition.next();
        }

      };

      rendition.on("keyup", keyListener);
      document.addEventListener("keyup", keyListener, false);

      // Generate locations for progress tracking
      book.locations.generate().then(function() {
        console.log("Locations generated:", book.locations.length());
      });

    })


    rendition.on("rendered", function(section){
      var current = getCurrentNavItem(section.href);

      if (current) {

        var titleEl = document.getElementById("chapter_title");
        if (titleEl) {
          titleEl.textContent = current.label;
        }
      }

      var items = document.querySelectorAll("#toc li");
      items.forEach(li => li.classList.remove("active"));

      if (current) {
        items.forEach(li => {
          if (li.textContent === current.label) {
            li.classList.add("active");
          }
        });
      }
    });


    rendition.on("relocated", function(location){
      console.log(location);

      var next = book.package.metadata.direction === "rtl" ?  document.getElementById("prev") : document.getElementById("next");
      var prev = book.package.metadata.direction === "rtl" ?  document.getElementById("next") : document.getElementById("prev");

      if (location.atEnd) {
        next.style.visibility = "hidden";
      } else {
        next.style.visibility = "visible";
      }

      if (location.atStart) {
        prev.style.visibility = "hidden";
      } else {
        prev.style.visibility = "visible";
      }

      // Update progress bar and page counter
      if (location && location.start) {
        var percentage = location.start.percentage || 0;

        // Use percentage for progress bar (works immediately)
        var progressBar = document.getElementById("progress-bar");
        if (progressBar) {
          progressBar.style.width = (percentage * 100) + "%";
        }

        var currentPageEl = document.getElementById("current-page");
        var totalPagesEl = document.getElementById("total-pages");
        var displayed = location.start.displayed;

        if (currentPageEl && totalPagesEl) {
          // Display real rendered pages for the current section.
          if (displayed && displayed.total > 0) {
            currentPageEl.textContent = displayed.page;
            totalPagesEl.textContent = displayed.total;
          } else {
            currentPageEl.textContent = "-";
            totalPagesEl.textContent = "-";
          }
        }
      }
    });


    rendition.on("layout", function(layout) {
      let viewer = document.getElementById("viewer");

      if (layout.spread) {
        viewer.classList.remove('single');
      } else {
        viewer.classList.add('single');
      }
    });

    window.addEventListener("unload", function () {
      console.log("unloading");
      this.book.destroy();
    });

    function resolveChapterTarget(href) {
      if (!href) {
        return href;
      }

      // Most books resolve directly from nav href.
      if (book.spine.get(href)) {
        return href;
      }

      // Some books have nav hrefs relative to the nav document directory.
      var navPath = book.packaging && book.packaging.navPath;
      if (navPath) {
        var navDirIndex = navPath.lastIndexOf("/");
        var navDir = navDirIndex > -1 ? navPath.slice(0, navDirIndex + 1) : "";
        var relHref = href.replace(/^\.\//, "").replace(/^\/+/, "");
        var resolvedHref = navDir + relHref;

        if (book.spine.get(resolvedHref)) {
          return resolvedHref;
        }
      }

      return href;
    }

    function getCurrentNavItem(sectionHref) {
      if (!book.navigation || !sectionHref) {
        return null;
      }

      var current = book.navigation.get(sectionHref);
      if (current) {
        return current;
      }

      var navPath = book.packaging && book.packaging.navPath;
      if (!navPath) {
        return null;
      }

      var navDirIndex = navPath.lastIndexOf("/");
      var navDir = navDirIndex > -1 ? navPath.slice(0, navDirIndex + 1) : "";

      if (sectionHref.indexOf(navDir) === 0) {
        current = book.navigation.get(sectionHref.slice(navDir.length));
        if (current) {
          return current;
        }
      }

      return book.navigation.get(navDir + sectionHref) || null;
    }


    book.loaded.navigation.then(function(toc){

      var select = document.getElementById("toc");

			toc.forEach(function(chapter) {

        var li = document.createElement("li");
        li.textContent = chapter.label;

        li.addEventListener("click", function(e) {
          e.stopPropagation();
          var target = resolveChapterTarget(chapter.href);
          rendition.display(target).catch(function(err) {
            console.warn("Unable to display chapter target:", chapter.href, "->", target, err);
          });
          document.getElementById("tocPanel").classList.remove("open");
        });

        select.appendChild(li);
			});
		});

    let arrowTimeout;

    function showArrows(e) {
      if (tocIsOpen()) return;

      const arrows = document.querySelectorAll(".arrow");
      arrows.forEach(a => a.classList.remove("hidden"));

      clearTimeout(arrowTimeout);

      arrowTimeout = setTimeout(() => {
        arrows.forEach(a => a.classList.add("hidden"));
      }, 2000); // 2 seconds
    } 


    function toggleHeader() {
      document.getElementById("app").classList.toggle("hide-header");

      // Header visibility changes available reading height; force repagination.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          var viewer = document.getElementById("viewer");
          if (viewer) {
            rendition.resize(viewer.clientWidth, viewer.clientHeight);
          } else {
            rendition.resize();
          }
        });
      });
    }

    document.getElementById("centerToggle").addEventListener("click", function(e) {
      e.stopPropagation();
      toggleHeader();
    });


    showArrows({ target: document.body });

  </script>

</body>
</html>
